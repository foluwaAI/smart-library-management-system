<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Register | Smart Library Management System</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{

    background:
    linear-gradient(rgba(5,25,60,.78),rgba(5,25,60,.78)),
    url("images/library.jpg");

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    background-attachment:fixed;

    color:white;
}

/* Navigation */

nav{

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:20px 70px;

    background:rgba(0,0,0,.35);
    backdrop-filter:blur(6px);

}

.logo{

    font-size:30px;
    font-weight:bold;

}

nav ul{

    display:flex;
    list-style:none;

}

nav ul li{

    margin-left:25px;

}

nav ul li a{

    text-decoration:none;
    color:white;
    font-weight:bold;
    transition:.3s;

}

nav ul li a:hover,
.active{

    color:#FFD54F;

}

/* Register Box */

.container{

    display:flex;
    justify-content:center;
    align-items:center;

    padding:60px 20px;

}

.register-box{

    width:450px;

    background:rgba(255,255,255,.12);

    backdrop-filter:blur(12px);

    padding:35px;

    border-radius:15px;

    box-shadow:0 10px 25px rgba(0,0,0,.3);

}

.register-box h2{

    text-align:center;

    color:#FFD54F;

    margin-bottom:25px;

}

label{

    display:block;

    margin-top:15px;

    margin-bottom:8px;

}

input{

    width:100%;

    padding:14px;

    border:none;

    border-radius:8px;

    outline:none;

    font-size:15px;

}

button{

    width:100%;

    padding:15px;

    margin-top:25px;

    border:none;

    border-radius:8px;

    background:#FFD54F;

    color:black;

    font-size:17px;

    font-weight:bold;

    cursor:pointer;

    transition:.3s;

}

button:hover{

    background:white;

}

.register-box p{

    text-align:center;

    margin-top:20px;

}

.register-box a{

    color:#FFD54F;

    text-decoration:none;

}

.register-box a:hover{

    text-decoration:underline;

}

/* Footer */

footer{

    margin-top:50px;

    background:rgba(0,0,0,.45);

    text-align:center;

    padding:20px;

}

footer a{

    color:#FFD54F;

    text-decoration:none;

    margin:0 10px;

}

footer a:hover{

    text-decoration:underline;

}

@media(max-width:900px){

nav{

    flex-direction:column;

}

nav ul{

    flex-direction:column;

    text-align:center;

    margin-top:15px;

}

nav ul li{

    margin:10px 0;

}

.register-box{

    width:95%;

}

}

</style>

</head>

<body>

<nav>

<div class="logo">📚 Smart Library</div>

<ul>

<li><a href="index.html">Home</a></li>

<li><a href="catalog.html">Books</a></li>

<li><a href="login.html">Login</a></li>

<li><a href="register.html" class="active">Register</a></li>

<li><a href="dashboard.html">Dashboard</a></li>

<li><a href="admin.html">Admin</a></li>

</ul>

</nav>

<div class="container">

<div class="register-box">

<h2>Create Account</h2>

<form id="registerForm">

<label>Full Name</label>

<input type="text" id="name" placeholder="Enter your full name" required>

<label>Matric Number</label>

<input type="text" id="matric" placeholder="Enter your matric number" required>

<label>Email Address</label>

<input type="email" id="email" placeholder="Enter your email" required>

<label>Phone Number</label>

<input type="tel" id="phone" placeholder="Enter your phone number" required>

<label>Password</label>

<input type="password" id="password" placeholder="Create a password" required>

<label>Confirm Password</label>

<input type="password" id="confirmPassword" placeholder="Confirm your password" required>

<p id="errorMsg" style="color:#ff6b6b; text-align:center; display:none;"></p>
<p id="successMsg" style="color:#a5d6a7; text-align:center; display:none;"></p>

<button type="submit">Register</button>

<p>

Already have an account?

<a href="login.html">Login Here</a>

</p>

</form>

</div>

</div>

<footer>

<p>

<a href="index.html">Home</a> |

<a href="catalog.html">Books</a> |

<a href="login.html">Login</a>

</p>

<br>

<p>&copy; 2026 Smart Library Management System</p>

</footer>

<script>
document.getElementById('registerForm').addEventListener('submit', async (e) => {
  e.preventDefault();

  const name = document.getElementById('name').value;
  const matric_number = document.getElementById('matric').value;
  const email = document.getElementById('email').value;
  const phone = document.getElementById('phone').value;
  const password = document.getElementById('password').value;
  const confirmPassword = document.getElementById('confirmPassword').value;

  const errorMsg = document.getElementById('errorMsg');
  const successMsg = document.getElementById('successMsg');
  errorMsg.style.display = 'none';
  successMsg.style.display = 'none';

  if (password !== confirmPassword) {
    errorMsg.textContent = 'Passwords do not match';
    errorMsg.style.display = 'block';
    return;
  }

  try {
    const response = await fetch('/api/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, matric_number, email, phone, password })
    });

    const data = await response.json();

    if (!response.ok) {
      errorMsg.textContent = data.error || 'Registration failed';
      errorMsg.style.display = 'block';
      return;
    }

    successMsg.textContent = 'Account created! Redirecting to login...';
    successMsg.style.display = 'block';

    setTimeout(() => {
      window.location.href = 'login.html';
    }, 1500);

  } catch (err) {
    errorMsg.textContent = 'Something went wrong. Please try again.';
    errorMsg.style.display = 'block';
  }
});
</script>

</body>
</html>
